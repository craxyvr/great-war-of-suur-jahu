<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Great War Of Suur Jahu</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a12;font-family:'Segoe UI',Arial,sans-serif;color:#fff;user-select:none;-webkit-user-select:none}
canvas{display:block}
#gameCanvas{position:absolute;top:0;left:0;width:100%;height:100%}

.screen{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:10}
.screen.active{display:flex}

#menuScreen{background:linear-gradient(135deg,#0a0a1a 0%,#1a1a3a 50%,#0a0a1a 100%)}
#menuScreen h1{font-size:3em;color:#ff4444;text-shadow:0 0 40px rgba(255,68,68,0.4);margin-bottom:8px;text-align:center;line-height:1.2}
#menuScreen .sub{font-size:1em;color:#667;margin-bottom:35px}
#menuScreen .menu-btn{background:linear-gradient(135deg,#2a2a4a,#1a1a3a);border:2px solid #ff4444;color:#fff;padding:14px 50px;font-size:1.2em;cursor:pointer;border-radius:8px;transition:all .3s;margin:5px;min-width:200px}
#menuScreen .menu-btn:hover{background:#ff4444;transform:scale(1.05);box-shadow:0 0 30px rgba(255,68,68,0.3)}

#mapSelectScreen{background:linear-gradient(135deg,#0a0a1a,#1a1a3a)}
#mapSelectScreen h2{font-size:2em;color:#ff4444;margin-bottom:25px;text-shadow:0 0 20px rgba(255,68,68,0.3)}
.map-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:16px;max-width:960px;width:90%;padding:10px}
.map-card{background:linear-gradient(135deg,#1a1a3a,#2a2a4a);border:2px solid #334;border-radius:12px;padding:16px;cursor:pointer;transition:all .3s;text-align:center}
.map-card:hover{transform:translateY(-4px);border-color:#ff4444;box-shadow:0 8px 30px rgba(255,68,68,0.15)}
.map-card .prev-wrap{width:100%;height:110px;background:#0a0a1a;border-radius:6px;margin-bottom:10px;overflow:hidden;position:relative}
.map-card .mn{font-size:1.1em;font-weight:bold;margin-bottom:4px}
.map-card .md{font-size:.8em;color:#8899aa;margin-bottom:4px}
.map-card .mc{font-size:.75em;color:#556}
.map-back{position:absolute;top:18px;left:18px;background:transparent;border:2px solid #556;color:#8899aa;padding:8px 22px;cursor:pointer;border-radius:6px;font-size:.95em;transition:all .3s;z-index:5}
.map-back:hover{border-color:#ff4444;color:#ff4444}

#pickOverlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:15;display:none;pointer-events:none}
#pickOverlay.active{display:block}
#pickOverlay .pick-bg{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.3);pointer-events:none}
#pickPanel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(135deg,#1a1a3a,#2a2a4a);border:2px solid #556;border-radius:16px;padding:25px 35px;text-align:center;min-width:300px;box-shadow:0 20px 60px rgba(0,0,0,0.6);pointer-events:auto}
#pickPanel h2{font-size:1.6em;margin-bottom:6px}
#pickPanel .pp-desc{color:#8899aa;font-size:.9em;margin-bottom:12px}
#pickPanel .pp-stats{display:flex;justify-content:center;gap:10px;margin:12px 0;flex-wrap:wrap}
#pickPanel .pp-stat{display:flex;flex-direction:column;align-items:center;background:rgba(0,0,0,0.4);padding:6px 10px;border-radius:6px;min-width:50px}
#pickPanel .pp-stat .s-label{font-size:.65em;color:#667}
#pickPanel .pp-stat .s-val{font-size:1.2em;font-weight:bold}
#pickPanel .pp-btns{display:flex;gap:10px;justify-content:center;margin-top:14px}
#pickPanel .pp-btns button{background:linear-gradient(135deg,#2a2a4a,#1a1a3a);border:2px solid #556;color:#fff;padding:10px 24px;cursor:pointer;border-radius:8px;font-size:.95em;transition:all .3s}
#pickPanel .pp-btns button:hover{border-color:#ff4444}
#pickPanel .pp-btns .play-btn{background:linear-gradient(135deg,#ff4444,#cc3333);border-color:#ff4444;font-weight:bold}
#pickPanel .pp-btns .play-btn:hover{box-shadow:0 0 25px rgba(255,68,68,0.4)}
#pickPanel .pick-hint{font-size:.85em;color:#667;margin-bottom:8px}

.top-bar{position:absolute;top:8px;left:8px;right:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;z-index:8;pointer-events:none}
.top-bar>*{pointer-events:auto}
.top-bar .ci{background:rgba(8,8,25,0.88);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:6px 12px;display:flex;align-items:center;gap:10px;backdrop-filter:blur(8px)}
.top-bar .ci .flag{width:24px;height:24px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);flex-shrink:0}
.top-bar .ci .cname{font-weight:bold;font-size:.9em}
.top-bar .st{display:flex;gap:6px;flex-wrap:wrap}
.top-bar .st .s{display:flex;align-items:center;gap:3px;font-size:.72em;background:rgba(0,0,0,0.4);padding:3px 8px;border-radius:5px}
.top-bar .st .s .ic{font-size:.85em}
.top-bar .st .s .vl{font-weight:bold}

.ctrl-bar{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px;align-items:center;background:rgba(8,8,25,0.88);border:1px solid rgba(255,255,255,0.08);padding:6px 12px;border-radius:10px;backdrop-filter:blur(8px);z-index:8;pointer-events:none}
.ctrl-bar>*{pointer-events:auto}
.ctrl-bar button{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:#ccc;padding:5px 12px;cursor:pointer;border-radius:5px;font-size:.8em;transition:all .2s;white-space:nowrap}
.ctrl-bar button:hover{background:rgba(255,255,255,0.15);color:#fff}
.ctrl-bar button.active{background:#ff4444;border-color:#ff4444;color:#fff}
.ctrl-bar .sep{width:1px;height:20px;background:rgba(255,255,255,0.1)}

.minimap-wrap{position:absolute;bottom:70px;right:10px;width:150px;height:100px;background:rgba(8,8,25,0.88);border:1px solid rgba(255,255,255,0.08);border-radius:7px;overflow:hidden;backdrop-filter:blur(8px);cursor:pointer;z-index:8;pointer-events:none}
.minimap-wrap>*{pointer-events:auto}
.minimap-wrap canvas{width:100%;height:100%}

.info-panel{position:absolute;right:10px;top:70px;background:rgba(8,8,25,0.88);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:12px;min-width:170px;max-width:200px;backdrop-filter:blur(8px);display:none;z-index:8;pointer-events:none}
.info-panel>*{pointer-events:auto}
.info-panel h3{font-size:.9em;margin-bottom:4px}
.info-panel .ir{display:flex;justify-content:space-between;font-size:.75em;padding:2px 0;color:#b0b0c0}
.info-panel .ir .il{color:#556}

.dip-panel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(10,10,30,0.96);border:2px solid rgba(255,255,255,0.12);border-radius:14px;padding:22px;min-width:340px;max-width:90%;max-height:80vh;overflow-y:auto;backdrop-filter:blur(10px);display:none;z-index:20}
.dip-panel h2{font-size:1.3em;margin-bottom:12px;color:#ff4444}
.dip-panel .dr{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.dip-panel .dr:last-child{border-bottom:none}
.dip-panel .dr .dn{font-weight:bold;display:flex;align-items:center;gap:7px;font-size:.9em}
.dip-panel .dr .dn .dfl{width:14px;height:14px;border-radius:50%;display:inline-block}
.dip-panel .dr .ds{font-size:.8em;padding:2px 8px;border-radius:4px}
.dip-panel .dr .ds.war{color:#ff4444;border:1px solid rgba(255,68,68,0.3)}
.dip-panel .dr .ds.allied{color:#4f4;border:1px solid rgba(68,255,68,0.3)}
.dip-panel .dr .ds.peace{color:#8899aa;border:1px solid rgba(136,153,170,0.2)}
.dip-panel .da{display:flex;gap:5px}
.dip-panel .da button{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:#ccc;padding:4px 10px;cursor:pointer;border-radius:4px;font-size:.7em;transition:all .2s}
.dip-panel .da button:hover{background:rgba(255,255,255,0.15)}
.dip-panel .da .bw{color:#ff4444;border-color:rgba(255,68,68,0.3)}
.dip-panel .da .ba{color:#4f4;border-color:rgba(68,255,68,0.2)}
.dip-panel .close-dip{position:absolute;top:10px;right:12px;background:transparent;border:none;color:#556;font-size:1.4em;cursor:pointer}
.dip-panel .close-dip:hover{color:#ff4444}

.war-confirm{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(10,10,30,0.96);border:2px solid #ff4444;border-radius:10px;padding:22px 30px;text-align:center;z-index:25;display:none;min-width:260px}
.war-confirm h3{color:#ff4444;margin-bottom:8px}
.war-confirm p{margin-bottom:12px;color:#b0b0c0;font-size:.9em}
.war-confirm button{background:#ff4444;border:none;color:#fff;padding:7px 22px;border-radius:5px;cursor:pointer;margin:0 5px;font-size:.9em}
.war-confirm .wc-cancel{background:transparent;border:1px solid #556;color:#8899aa}

.vic-screen{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.88);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:30}
.vic-screen h2{font-size:2.8em;margin-bottom:8px}
.vic-screen p{font-size:1.1em;color:#b0b0c0;margin-bottom:25px;text-align:center;padding:0 20px}
.vic-screen button{background:linear-gradient(135deg,#2a2a4a,#1a1a3a);border:2px solid #ff4444;color:#fff;padding:12px 35px;font-size:1.1em;cursor:pointer;border-radius:7px;margin:4px;transition:all .3s;min-width:180px}
.vic-screen button:hover{background:#ff4444;transform:scale(1.04)}

@media(max-width:768px){
  #menuScreen h1{font-size:2em}
  .map-grid{grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
  .top-bar .ci{padding:4px 8px}
  .top-bar .ci .cname{font-size:.8em}
  .top-bar .st .s{font-size:.65em;padding:2px 6px}
  .ctrl-bar{padding:4px 8px;gap:3px}
  .ctrl-bar button{padding:3px 8px;font-size:.7em}
  .minimap-wrap{width:110px;height:73px;bottom:60px;right:6px}
  .info-panel{display:none!important}
  .dip-panel{min-width:280px;padding:16px}
  #pickPanel{padding:18px 22px;min-width:240px}
  #pickPanel h2{font-size:1.3em}
}
</style>
</head>
<body>

<div id="menuScreen" class="screen active">
  <h1>⚔ GREAT WAR<br>OF SUUR JAHU</h1>
  <div class="sub">A Strategy War Game of Territory Conquest</div>
  <button class="menu-btn" onclick="showMapSelect()">▶ PLAY GAME</button>
</div>

<div id="mapSelectScreen" class="screen">
  <button class="map-back" onclick="showMenu()">← BACK</button>
  <h2>SELECT BATTLE MAP</h2>
  <div class="map-grid" id="mapGrid"></div>
</div>

<div id="gameScreen" class="screen">
  <canvas id="gameCanvas"></canvas>

  <div id="pickOverlay">
    <div class="pick-bg"></div>
    <div id="pickPanel">
      <div class="pick-hint">Click a country on the map to select it</div>
      <h2 id="pickTitle">-</h2>
      <div class="pp-desc" id="pickDesc"></div>
      <div class="pp-stats" id="pickStats"></div>
      <div class="pp-btns" id="pickBtns">
        <button class="play-btn" onclick="confirmPick()">PLAY AS THIS COUNTRY</button>
        <button onclick="closePick()">CANCEL</button>
      </div>
    </div>
  </div>

  <div class="top-bar" id="topBar" style="display:none">
    <div class="ci">
      <div class="flag" id="pFlag"></div>
      <span class="cname" id="pName">-</span>
    </div>
    <div class="st">
      <div class="s"><span class="ic">👤</span><span class="vl" id="statPop">0</span></div>
      <div class="s"><span class="ic">💰</span><span class="vl" id="statMoney">0</span></div>
      <div class="s"><span class="ic">⚔</span><span class="vl" id="statArmy">0</span></div>
      <div class="s"><span class="ic">🏆</span><span class="vl" id="statTerr">0</span></div>
    </div>
  </div>

  <div class="info-panel" id="infoPanel">
    <h3 id="infoTitle">Territory</h3>
    <div class="ir"><span class="il">Owner</span><span id="infoOwner">-</span></div>
    <div class="ir"><span class="il">Army</span><span id="infoArmy">0</span></div>
    <div class="ir"><span class="il">Income</span><span id="infoIncome">0</span></div>
    <div class="ir"><span class="il">Type</span><span id="infoType">Land</span></div>
  </div>

  <div class="minimap-wrap" id="minimapWrap">
    <canvas id="minimapCanvas"></canvas>
  </div>

  <div class="ctrl-bar">
    <button onclick="togglePause()" id="pauseBtn">⏸ PAUSE</button>
    <div class="sep"></div>
    <button onclick="setSpeed(1)" id="sp1">1×</button>
    <button onclick="setSpeed(2)" id="sp2">2×</button>
    <button onclick="setSpeed(3)" id="sp3">3×</button>
    <div class="sep"></div>
    <button onclick="showDiplomacy()">🤝 DIPLOMACY</button>
    <div class="sep"></div>
    <button onclick="goMapSelect()">🗺 MAPS</button>
    <button onclick="restartGame()">↻ RESTART</button>
  </div>

  <div class="dip-panel" id="dipPanel">
    <button class="close-dip" onclick="closeDiplomacy()">✕</button>
    <h2>DIPLOMACY</h2>
    <div id="dipList"></div>
  </div>

  <div class="war-confirm" id="warConfirm">
    <h3>⚔ DECLARE WAR</h3>
    <p id="warText">Declare war?</p>
    <button onclick="doDipAction()">CONFIRM</button>
    <button class="wc-cancel" onclick="cancelWar()">CANCEL</button>
  </div>

  <div class="vic-screen" id="vicScreen">
    <h2 id="vicTitle">🏆 VICTORY!</h2>
    <p id="vicText">You have conquered all!</p>
    <button onclick="goMapSelect()">🗺 MAP SELECT</button>
    <button onclick="restartGame()">↻ PLAY AGAIN</button>
    <button onclick="showMenu()">🏠 MAIN MENU</button>
  </div>
</div>

<script>
// ================================================================
//  GREAT WAR OF SUUR JAHU  -  Complete Game Engine
// ================================================================

// ---- CONSTANTS ----
const COUNTRIES = [
  { id:0, name:"Suur Jahu",      color:"#e53935", atk:7,  def:7,  eco:6,  nav:5,  diff:"Normal" },
  { id:1, name:"USSR",           color:"#fdd835", atk:8,  def:8,  eco:9,  nav:6,  diff:"Easy" },
  { id:2, name:"Kaevatsi Laid",  color:"#43a047", atk:10, def:10, eco:10, nav:9,  diff:"Strongest" },

const NC = COUNTRIES.length;
const VW = 2400, VH = 1600;

// ---- MAP DATA ----
// Each territory: [name, [[x,y],...], ownerId, army, isCapital, dev, [neighborIndices], isWater]

function t(name, pts, owner, army, cap, dev, nei, water) {
  const cx = pts.reduce((s,p)=>s+p[0],0)/pts.length;
  const cy = pts.reduce((s,p)=>s+p[1],0)/pts.length;
  return { name, pts, center:[cx,cy], owner, army, isCapital:!!cap, dev:dev||1, neighbors:nei||[], isWater:!!water };
}

function sea(name, pts, nei) { return t(name, pts, -1, 0, false, 0, nei||[], true); }

// ---- MAP 0: Baltic Front ----
const MAP0 = [

  t("Kihelkonna",[[140,460],[200,490],[260,520],[220,570],[130,540]], 3,200,0,0.6,[8]),
  t("Leningrad",[[960,260],[1080,190],[1220,220],[1260,320],[1100,360],[940,350]], 1,800,0,1.2,[3,11,16]),

  t("Moscow",[[1480,380],[1680,340],[1820,440],[1760,580],[1560,560],[1440,500]], 1,1200,0,1.5,[11,17,19]),
  t("Smolensk",[[1320,520],[1520,480],[1620,600],[1500,720],[1280,680],[1240,600]], 1,600,0,1.0,[12,16,18,19]),
  t("Belarus",[[1120,700],[1320,680],[1400,800],[1280,940],[1080,900],[1020,780]], 1,700,0,1.1,[12,17,20]),
  t("Sea Link A",[[380,240],[450,220],[500,260],[460,310],[390,290]], -1,0,0,0,[8],1),
  t("Sea Link B",[[550,180],[620,150],[680,200],[640,260],[570,240]], -1,0,0,0,[5,8],1),
];

// ---- MAP 1: Full USSR War ----
const MAP1 = [
  t("Tallinn",[[350,350],[480,300],[580,340],[550,440],[420,450],[320,400]],0,600,1,1.2,[1,3,8,12]),
  t("Tartu",[[550,440],[680,400],[780,470],[730,570],[620,580],[520,520]],0,350,0,0.9,[0,2,4,13]),

  t("Smolensk",[[1280,600],[1480,560],[1580,680],[1460,800],[1260,760],[1220,680]],1,600,0,1.0,[11,15,18,20]),
  t("Tver",[[1140,420],[1280,380],[1420,420],[1440,540],[1280,520],[1160,500]],1,400,0,0.8,[12,15,16]),
  t("Belarus",[[1060,700],[1260,680],[1340,820],[1220,960],[1020,920],[940,800]],1,700,0,1.1,[13,17,21]),
  t("Ural",[[1820,550],[2000,500],[2150,580],[2100,720],[1900,700],[1760,650]],1,800,0,1.0,[15,21]),
  t("Siberia",[[2000,720],[2200,680],[2400,760],[2350,900],[2100,880],[1950,820]],1,600,0,0.6,[19,20]),
  sea("Sea N",[[150,200],[280,160],[340,230],[220,280],[130,250]],[0,4,7]),
];

// ---- HELPERS ----
function polyCenter(pts) {
  let x=0,y=0,n=pts.length;
  for(const p of pts){x+=p[0];y+=p[1]}
  return [x/n,y/n];
}

function ptInPoly(px,py,pts) {
  let inside=false;
  for(let i=0,j=pts.length-1;i<pts.length;j=i++){
    const xi=pts[i][0],yi=pts[i][1],xj=pts[j][0],yj=pts[j][1];
    if((yi>py)!==(yj>py)&&px<(xj-xi)*(py-yi)/(yj-yi)+xi) inside=!inside;
  }
  return inside;
}

function scrToWorld(sx,sy) {
  const c=G.camera;
  return [(sx-W/2)/c.zoom+c.x, (sy-H/2)/c.zoom+c.y];
}
function worldToScr(wx,wy) {
  const c=G.camera;
  return [(wx-c.x)*c.zoom+W/2, (wy-c.y)*c.zoom+H/2];
}

function initMap(idx) {
  const md = MAPS[idx];
  G.mapIdx = idx;
  G.terrs = md.data.map((td,i)=>{
    const cx = td.center ? td.center[0] : polyCenter(td.pts)[0];
    const cy = td.center ? td.center[1] : polyCenter(td.pts)[1];
    return {
      id: i,
      name: td.name,
      pts: td.pts.map(p=>[p[0],p[1]]),
      center: [cx,cy],
      owner: td.owner,
      army: td.army,
      isCapital: !!td.isCapital,
      dev: td.dev || 1,
      neighbors: [...(td.neighbors||[])],
      isWater: !!td.isWater
    };
  });
  G.countries = COUNTRIES.map(c=>({
    id:c.id, name:c.name, color:c.color, atk:c.atk, def:c.def, eco:c.eco, nav:c.nav, alive:true
  }));
  G.diplomacy = {
    alliances: Array.from({length:NC},()=>new Set()),
    wars: Array.from({length:NC},()=>new Set()),
  };
  G.player = -1;
  G.selected = -1;
  G.hovered = -1;
  G.attackFrom = -1;
  G.paused = true;
  G.speed = 1;
  G.tickAcc = 0;
  G.time = 0;
  G.won = false;
  G.lost = false;
  G.turn = 0;
  G.effects = [];
  G.msgs = [];
  G.picking = true;
  G.lastPlayer = -1;

  // Center camera
  let cx=0,cy=0,n=0;
  for(const t of G.terrs) if(!t.isWater){cx+=t.center[0];cy+=t.center[1];n++}
  if(n){cx/=n;cy/=n}
  G.camera.x=G.camera.tx=cx;
  G.camera.y=G.camera.ty=cy;
  G.camera.zoom=G.camera.tz=0.6;

function drawMiniPreview(c,data){
  const cx=c.getContext('2d');
  const cw=c.width,ch=c.height;
  cx.fillStyle='#0a1628';cx.fillRect(0,0,cw,ch);
  const sx=cw/VW, sy=ch/VH;
  for(const t of data){
    if(!t.pts||t.pts.length<2)continue;
    const col=t.owner>=0?COUNTRIES[t.owner].color:'#1a2a4a';
    cx.fillStyle=t.isWater?'#0d1f3c':col;
    cx.strokeStyle='rgba(255,255,255,0.2)';cx.lineWidth=0.5;
    cx.beginPath();cx.moveTo(t.pts[0][0]*sx,t.pts[0][1]*sy);
    for(let i=1;i<t.pts.length;i++)cx.lineTo(t.pts[i][0]*sx,t.pts[i][1]*sy);
    cx.closePath();cx.fill();cx.stroke();
  }
}

function getTerrAt(sx,sy){
  const [wx,wy]=scrToWorld(sx,sy);
  for(let i=G.terrs.length-1;i>=0;i--){
    const t=G.terrs[i];
    if(t.isWater||t.owner<0)continue;
    if(ptInPoly(wx,wy,t.pts))return i;
  }
  return -1;
}

function onCanvasClick(sx,sy){
  if(G.picking){
    const tid=getTerrAt(sx,sy);
    if(tid>=0){
      const t=G.terrs[tid];
      const cid=t.owner;
      const cc=COUNTRIES[cid];
      document.getElementById('pickTitle').textContent='Pick Country: '+cc.name;
      const nterr=G.terrs.filter(x=>x.owner===cid&&!x.isWater).length;
      document.getElementById('pickDesc').textContent=cc.diff+' · '+nterr+' territories';
      document.getElementById('pickStats').innerHTML=
        '<div class="pp-stat"><span class="s-label">ATK</span><span class="s-val" style="color:'+cc.color+'">'+cc.atk+'</span></div>'+
        '<div class="pp-stat"><span class="s-label">DEF</span><span class="s-val" style="color:'+cc.color+'">'+cc.def+'</span></div>'+
        '<div class="pp-stat"><span class="s-label">ECO</span><span class="s-val" style="color:'+cc.color+'">'+cc.eco+'</span></div>'+
        '<div class="pp-stat"><span class="s-label">NAVY</span><span class="s-val" style="color:'+cc.color+'">'+cc.nav+'</span></div>'+
        '<div class="pp-stat"><span class="s-label">TERR</span><span class="s-val" style="color:'+cc.color+'">'+nterr+'</span></div>';
      document.getElementById('pickBtns').style.display='flex';
      G.selected=cid;
    }
    return;
  }
  if(G.paused||G.won||G.lost)return;
  const tid=getTerrAt(sx,sy);
  if(tid<0){
    G.attackFrom=-1;
    document.getElementById('infoPanel').style.display='none';
    return;
  }
  const t=G.terrs[tid];
  if(t.owner===G.player&&t.army>0&&!t.isWater){
    if(G.attackFrom===tid){G.attackFrom=-1;return;}
    G.attackFrom=tid;
    G.selected=tid;
  }else if(G.attackFrom>=0&&canAttack(G.attackFrom,tid)){
    executeBattle(G.attackFrom,tid);
    G.attackFrom=-1;
  }else{
    G.selected=tid;
    G.attackFrom=-1;
    showInfo(tid);
  }
}

// ---- COMBAT ----
function canAttack(fromId,toId){
  const from=G.terrs[fromId],to=G.terrs[toId];
  if(!from||!to)return false;
  if(from.owner<0||to.owner<0)return false;
  if(from.owner===to.owner)return false;
  if(from.army<=5)return false;
  if(from.isWater||to.isWater)return false;
  if(!from.neighbors.includes(toId)&&!to.neighbors.includes(fromId))return false;
  const st=getStatus(from.owner,to.owner);
  if(st==='allied')return false;
  return true;
}

function executeBattle(fromId,toId){
  const from=G.terrs[fromId],to=G.terrs[toId];
  if(!from||!to)return false;
  const atkC=COUNTRIES[from.owner],defC=COUNTRIES[to.owner];
  const sent=Math.min(from.army,Math.floor(from.army*0.5)+10);
  if(sent<5)return false;
  from.army-=sent;

  // Water crossing penalty
  const direct=from.neighbors.includes(toId);
  const waterPenalty=direct?1:(1-atkC.nav*0.04);

  const atkPow=sent*(atkC.atk/10)*waterPenalty;
  const defPow=to.army*(defC.def/10)*1.3+(to.isCapital?40:0);

  addEffect((from.center[0]+to.center[0])/2,(from.center[1]+to.center[1])/2,'battle',25);

  if(atkPow>defPow){
    const rem=Math.max(1,Math.floor((atkPow-defPow)*0.25));
    const oldOwner=to.owner;
    to.owner=from.owner;
    to.army=Math.min(rem,sent);
    addMsg(COUNTRIES[from.owner].name+' captured '+to.name+'!');
    if(oldOwner>=0&&oldOwner!==from.owner){
      const alive=G.terrs.some(t=>t.owner===oldOwner&&!t.isWater);
      if(!alive){
        G.countries[oldOwner].alive=false;
        addMsg(COUNTRIES[oldOwner].name+' has been DEFEATED!');
        if(oldOwner===G.player){G.lost=true;showVic(false);}
      }
    }
    checkVic();
    return true;
  }else{
    const losses=Math.min(to.army,Math.floor(sent*0.15));
    to.army=Math.max(1,to.army-losses);
    addMsg(COUNTRIES[from.owner].name+' attacked '+to.name+' and failed.');
    return false;
  }
}

function checkVic(){
  if(G.player<0)return;
  const alive=G.countries.filter(c=>c.alive);
  if(alive.length<=1&&G.countries[G.player].alive){
    G.won=true;
    showVic(true);
  }
}

function showVic(won){
  G.paused=true;
  document.getElementById('vicScreen').style.display='flex';
  if(won){
    document.getElementById('vicTitle').textContent='🏆 VICTORY!';
    document.getElementById('vicText').textContent='You conquered all territories as '+COUNTRIES[G.player].name+'!';
  }else{
    document.getElementById('vicTitle').textContent='💀 DEFEAT';
    document.getElementById('vicText').textContent=COUNTRIES[G.player].name+' has been wiped out!';
  }
}

// ---- DIPLOMACY ----
function getStatus(a,b){
  if(a===b)return 'self';
  const d=G.diplomacy;
  if(d.alliances[a].has(b))return 'allied';
  if(d.wars[a].has(b))return 'war';
  return 'peace';
}

function declareWar(a,b){
  G.diplomacy.wars[a].add(b);G.diplomacy.wars[b].add(a);
  G.diplomacy.alliances[a].delete(b);G.diplomacy.alliances[b].delete(a);
  if(a===G.player||b===G.player){
    const an=COUNTRIES[a].name,bn=COUNTRIES[b].name;
    addMsg('⚔ WAR: '+an+' declared war on '+bn+'!');
  }
}
function formAlliance(a,b){
  if(G.diplomacy.wars[a].has(b))return;
  G.diplomacy.alliances[a].add(b);G.diplomacy.alliances[b].add(a);
  if(a===G.player||b===G.player)
    addMsg('🤝 '+COUNTRIES[a].name+' and '+COUNTRIES[b].name+' formed an alliance!');
}
function makePeace(a,b){
  G.diplomacy.wars[a].delete(b);G.diplomacy.wars[b].delete(a);
  if(a===G.player||b===G.player)
    addMsg('☮ Peace between '+COUNTRIES[a].name+' and '+COUNTRIES[b].name+'.');
}

function showDiplomacy(){
  const p=document.getElementById('dipPanel');
  const l=document.getElementById('dipList');
  l.innerHTML='';
  for(let i=0;i<NC;i++){
    if(i===G.player||!G.countries[i].alive)continue;
    const cc=COUNTRIES[i];
    const st=getStatus(G.player,i);
    const row=document.createElement('div');row.className='dr';
    let stxt='Peace',scls='peace';
    if(st==='war'){stxt='⚔ WAR';scls='war'}
    if(st==='allied'){stxt='🤝 ALLIED';scls='allied'}
    let acts='';
    if(st!=='war')acts+=`<button class="bw" onclick="playerAct(${i},'war')">⚔ War</button>`;
    else acts+=`<button onclick="playerAct(${i},'peace')">☮ Peace</button>`;
    if(st==='peace')acts+=`<button class="ba" onclick="playerAct(${i},'ally')">🤝 Ally</button>`;
    if(st==='allied')acts+=`<button onclick="playerAct(${i},'break')">✕ Break</button>`;
    row.innerHTML=`<div class="dn"><span class="dfl" style="background:${cc.color}"></span>${cc.name}</div><span class="ds ${scls}">${stxt}</span><div class="da">${acts}</div>`;
    l.appendChild(row);
  }
  p.style.display='block';
}

function closeDiplomacy(){document.getElementById('dipPanel').style.display='none';}

let dipTarget=-1,dipAction='';
function playerAct(cid,act){
  dipTarget=cid;dipAction=act;
  if(act==='war'||act==='ally'){
    const word=act==='war'?'declare war on':'form alliance with';
    document.getElementById('warText').textContent=word.toUpperCase()+' '+COUNTRIES[cid].name+'?';
    document.getElementById('warConfirm').style.display='block';
  }else if(act==='peace'){
    makePeace(G.player,cid);showDiplomacy();
  }else if(act==='break'){
    G.diplomacy.alliances[G.player].delete(cid);
    G.diplomacy.alliances[cid].delete(G.player);
    showDiplomacy();
  }
}
function doDipAction(){
  if(dipAction==='war')declareWar(G.player,dipTarget);
  else if(dipAction==='ally')formAlliance(G.player,dipTarget);
  document.getElementById('warConfirm').style.display='none';
  showDiplomacy();
}
function cancelWar(){document.getElementById('warConfirm').style.display='none';dipTarget=-1;}

// ---- AI ----
function runAI(){
  if(G.paused||G.won||G.lost)return;
  for(let cid=0;cid<NC;cid++){
    if(cid===G.player||!G.countries[cid].alive)continue;
    const terrs=G.terrs.filter(t=>t.owner===cid&&!t.isWater);
    if(terrs.length===0){G.countries[cid].alive=false;continue;}

    // Attack
    const totalArmy=terrs.reduce((s,t)=>s+t.army,0);
    if(totalArmy<15)continue;

    let targets=[];
    for(const t of terrs){
      for(const nid of t.neighbors){
        const n=G.terrs[nid];
        if(!n||n.isWater||n.owner===cid)continue;
        const st=getStatus(cid,n.owner);
        if(st==='allied')continue;
        const bonus=(G.countries[n.owner]?COUNTRIES[n.owner].def:5)*1.5+(n.isCapital?40:0);
        if(t.army>n.army*1.1+bonus*0.4)
          targets.push({from:t,to:n,fid:t.id,tid:nid,score:t.army/(n.army+1)});
      }
    }
    targets.sort((a,b)=>b.score-a.score);
    let done=0;
    for(const tg of targets){
      if(done>=2)break;
      if(tg.from.army<10)continue;
      if(executeBattle(tg.fid,tg.tid))done++;
    }

    // AI diplomacy
    if(Math.random()<0.12){
      const enemies=[];
      for(let i=0;i<NC;i++)if(i!==cid&&G.countries[i].alive&&getStatus(cid,i)==='peace')enemies.push(i);
      if(enemies.length>0){
        const e=enemies[Math.floor(Math.random()*enemies.length)];
        const ms=totalArmy+terrs.length*10;
        const ts=G.terrs.filter(t=>t.owner===e&&!t.isWater).reduce((s,t)=>s+t.army,0)+G.terrs.filter(t=>t.owner===e&&!t.isWater).length*10;
        if(ms>ts*1.4||Math.random()<0.15)declareWar(cid,e);
      }
    }
    if(Math.random()<0.08){
      const allies=[];
      for(let i=0;i<NC;i++)if(i!==cid&&G.countries[i].alive&&getStatus(cid,i)==='peace'){
        const ts=G.terrs.filter(t=>t.owner===i&&!t.isWater).reduce((s,t)=>s+t.army,0)+G.terrs.filter(t=>t.owner===i&&!t.isWater).length*10;
        if(ts>totalArmy*1.3)allies.push(i);
      }
      if(allies.length>0){const a=allies[Math.floor(Math.random()*allies.length)];if(Math.random()<0.35)formAlliance(cid,a);}
    }
  }
}

// ---- EFFECTS & MESSAGES ----
function addEffect(x,y,type,dur){
  G.effects.push({x,y,type,time:0,dur});
}
function addMsg(m){
  G.msgs.unshift(m);
  if(G.msgs.length>15)G.msgs.pop();
}

// ---- INFO PANEL ----
function showInfo(tid){
  if(tid<0){document.getElementById('infoPanel').style.display='none';return;}
  const t=G.terrs[tid];
  const p=document.getElementById('infoPanel');
  document.getElementById('infoTitle').textContent=t.name;
  document.getElementById('infoOwner').textContent=t.owner>=0?COUNTRIES[t.owner].name:'None';
  document.getElementById('infoArmy').textContent=Math.floor(t.army);
  document.getElementById('infoIncome').textContent=Math.floor(t.dev*2);
  document.getElementById('infoType').textContent=t.isWater?'Sea':(t.isCapital?'Capital':'Land');
  p.style.display='block';
}

// ---- UI CONTROLS ----
function togglePause(){
  G.paused=!G.paused;
  document.getElementById('pauseBtn').textContent=G.paused?'▶ PLAY':'⏸ PAUSE';
}
function setSpeed(s){
  G.speed=s;
  ['sp1','sp2','sp3'].forEach(id=>document.getElementById(id).classList.remove('active'));
  document.getElementById('sp'+s).classList.add('active');
  saveSettings();
}

function restartGame(){
  document.getElementById('vicScreen').style.display='none';
  document.getElementById('dipPanel').style.display='none';
  document.getElementById('warConfirm').style.display='none';
  const prevPlayer=G.lastPlayer>=0?G.lastPlayer:G.player;
  if(G.mapIdx>=0){initMap(G.mapIdx);G.player=prevPlayer>=0?prevPlayer:0;G.picking=false;startPlaying();}
  else showMapSelect();
}

function goMapSelect(){
  document.getElementById('vicScreen').style.display='none';
  document.getElementById('dipPanel').style.display='none';
  document.getElementById('infoPanel').style.display='none';
  document.getElementById('pickOverlay').classList.remove('active');
  showMapSelect();
}

// ---- INPUT ----
function initInput(){
  const c=canvas;
  let mx,my;
  c.addEventListener('mousedown',e=>{
    const rect=c.getBoundingClientRect();
    const sx=(e.clientX-rect.left)*c.width/rect.width;
    const sy=(e.clientY-rect.top)*c.height/rect.height;
    if(G.picking){
      const tid=getTerrAt(sx,sy);
      if(tid<0){G.dragging=true;G.dragSX=e.clientX;G.dragSY=e.clientY;G.camSX=G.camera.tx;G.camSY=G.camera.ty;}
      else onCanvasClick(sx,sy);
      return;
    }
    if(e.button===0){
      const tid=getTerrAt(sx,sy);
      if(tid<0||(G.terrs[tid]&&G.terrs[tid].owner!==G.player)){
        G.dragging=true;
        G.dragSX=e.clientX;G.dragSY=e.clientY;
        G.camSX=G.camera.tx;G.camSY=G.camera.ty;
      }
      onCanvasClick(sx,sy);
    }
  });
  c.addEventListener('mousemove',e=>{
    const rect=c.getBoundingClientRect();
    const sx=(e.clientX-rect.left)*c.width/rect.width;
    const sy=(e.clientY-rect.top)*c.height/rect.height;
    G.mx=sx;G.my=sy;
    if(G.dragging){
      const dx=(e.clientX-G.dragSX)/G.camera.zoom;
      const dy=(e.clientY-G.dragSY)/G.camera.zoom;
      G.camera.tx=G.camSX-dx;
      G.camera.ty=G.camSY-dy;
    }else if(!G.picking){
      const tid=getTerrAt(sx,sy);
      G.hovered=tid;
    }
  });
  c.addEventListener('mouseup',()=>{G.dragging=false;});
  c.addEventListener('mouseleave',()=>{G.dragging=false;G.hovered=-1;});
  c.addEventListener('wheel',e=>{
    e.preventDefault();
    G.camera.tz=Math.max(0.2,Math.min(2.0,G.camera.tz*(e.deltaY>0?0.9:1.1)));
  },{passive:false});
  c.addEventListener('contextmenu',e=>{e.preventDefault();G.attackFrom=-1;});

  // Touch
  let t0=null,t1=null,ld=0,touchMoved=false;
  c.addEventListener('touchstart',e=>{
    e.preventDefault();
    touchMoved=false;
    if(e.touches.length===1){
      t0={x:e.touches[0].clientX,y:e.touches[0].clientY};
    }else if(e.touches.length===2){
      t1=e.touches;ld=Math.hypot(t1[0].clientX-t1[1].clientX,t1[0].clientY-t1[1].clientY);
    }
  },{passive:false});
  c.addEventListener('touchmove',e=>{
    e.preventDefault();
    touchMoved=true;
    if(e.touches.length===1&&t0){
      const dx=(e.touches[0].clientX-t0.x)/G.camera.zoom;
      const dy=(e.touches[0].clientY-t0.y)/G.camera.zoom;
      G.camera.tx-=dx;G.camera.ty-=dy;
      t0={x:e.touches[0].clientX,y:e.touches[0].clientY};
    }else if(e.touches.length===2){
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      if(ld>0)G.camera.tz=Math.max(0.2,Math.min(2.0,G.camera.tz*(d/ld)));
      ld=d;
    }
  },{passive:false});
  c.addEventListener('touchend',e=>{
    e.preventDefault();
    if(!touchMoved&&e.changedTouches.length===1&&t0){
      const rect=c.getBoundingClientRect();
      const sx=(e.changedTouches[0].clientX-rect.left)*c.width/rect.width;
      const sy=(e.changedTouches[0].clientY-rect.top)*c.height/rect.height;
      onCanvasClick(sx,sy);
    }
    t0=null;ld=0;
  },{passive:false});

  // Minimap click
  document.getElementById('minimapWrap').addEventListener('click',e=>{
    const rect=mCanvas.getBoundingClientRect();
    const rx=(e.clientX-rect.left)*mCanvas.width/rect.width;
    const ry=(e.clientY-rect.top)*mCanvas.height/rect.height;
    G.camera.tx=(rx/mCanvas.width)*VW;
    G.camera.ty=(ry/mCanvas.height)*VH;
  });
}

// ---- CAMERA ----
function updateCam(){
  const c=G.camera;
  if(G.keys['w']||G.keys['W'])c.ty-=18/c.zoom;
  if(G.keys['s']||G.keys['S'])c.ty+=18/c.zoom;
  if(G.keys['a']||G.keys['A'])c.tx-=18/c.zoom;
  if(G.keys['d']||G.keys['D'])c.tx+=18/c.zoom;
  c.x+=(c.tx-c.x)*0.1;
  c.y+=(c.ty-c.y)*0.1;
  c.zoom+=(c.tz-c.zoom)*0.1;
}

// ---- GAME TICK ----
function tick(){
  G.turn++;

  // Army growth for all territories
  for(const t of G.terrs){
    if(t.isWater||t.owner<0)continue;
    const growth = Math.max(1, Math.floor(t.dev * 0.7 + G.countries[t.owner].eco * 0.12));
    t.army += growth;
  }

  // Income / war score
  for(let cid=0;cid<NC;cid++){
    if(!G.countries[cid].alive)continue;
    const inc=G.terrs.filter(t=>t.owner===cid&&!t.isWater).reduce((s,t)=>s+t.dev*(G.countries[cid].eco*0.3+1),0);
    G.warScore+=(cid===G.player)?inc*0.01:0;
  }

  runAI();
  for(let i=G.effects.length-1;i>=0;i--){
    G.effects[i].time++;
    if(G.effects[i].time>G.effects[i].dur)G.effects.splice(i,1);
  }
}

// ---- RENDER ----
function render(){
  const c=ctx;
  c.fillStyle='#0a1628';c.fillRect(0,0,W,H);
  const cam=G.camera;
  c.save();
  c.translate(W/2,H/2);
  c.scale(cam.zoom,cam.zoom);
  c.translate(-cam.x,-cam.y);

  // Sea
  c.fillStyle='#0d1f3c';c.fillRect(-5000,-5000,10000,10000);

  // Territories
  for(let i=0;i<G.terrs.length;i++){
    const t=G.terrs[i];
    if(!t.pts||t.pts.length<2)continue;
    const col=t.owner>=0?COUNTRIES[t.owner].color:'#1a2a4a';
    c.fillStyle=t.isWater?'#0f2442':col;
    c.strokeStyle=t.isWater?'rgba(255,255,255,0.04)':'rgba(255,255,255,0.22)';
    c.lineWidth=t.isWater?0.5:2.5;
    if(i===G.selected||i===G.attackFrom){
      c.shadowColor=i===G.selected?'#fff':COUNTRIES[G.player>=0?G.player:0].color;
      c.shadowBlur=18;
    }else if(i===G.hovered&&!G.picking){
      c.shadowColor='rgba(255,255,255,0.25)';
      c.shadowBlur=8;
    }
    c.beginPath();c.moveTo(t.pts[0][0],t.pts[0][1]);
    for(let j=1;j<t.pts.length;j++)c.lineTo(t.pts[j][0],t.pts[j][1]);
    c.closePath();c.fill();c.stroke();
    c.shadowBlur=0;

    // Capital marker
    if(t.isCapital&&!t.isWater){
      c.fillStyle='rgba(255,255,255,0.5)';
      c.font='18px Arial';c.textAlign='center';c.textBaseline='middle';
      c.fillText('★',t.center[0],t.center[1]-20);
    }
  }

  // Labels
  for(const t of G.terrs){
    if(t.isWater)continue;
    c.fillStyle='rgba(255,255,255,0.85)';
    c.font='bold 12px Arial';c.textAlign='center';c.textBaseline='middle';
    c.shadowColor='rgba(0,0,0,0.9)';c.shadowBlur=5;
    c.fillText(t.name,t.center[0],t.center[1]-10);
    if(t.army>0&&t.owner>=0){
      c.fillStyle='#fff';
      c.font='bold 15px Arial';c.shadowBlur=4;
      c.fillText('⚔'+Math.floor(t.army),t.center[0],t.center[1]+14);
    }
    c.shadowBlur=0;
  }

  // Attack arc indicator
  if(G.attackFrom>=0&&!G.picking){
    const from=G.terrs[G.attackFrom];
    c.strokeStyle='rgba(255,255,255,0.5)';c.lineWidth=2.5;c.setLineDash([8,6]);
    c.beginPath();c.arc(from.center[0],from.center[1],28+Math.sin(G.time*0.08)*4,0,Math.PI*2);c.stroke();c.setLineDash([]);
  }
  if(G.attackFrom>=0&&G.hovered>=0&&G.hovered!==G.attackFrom&&canAttack(G.attackFrom,G.hovered)){
    const from=G.terrs[G.attackFrom],to=G.terrs[G.hovered];
    c.strokeStyle='rgba(255,200,50,0.4)';c.lineWidth=2;c.setLineDash([6,4]);
    c.beginPath();c.moveTo(from.center[0],from.center[1]);c.lineTo(to.center[0],to.center[1]);c.stroke();c.setLineDash([]);
    // Arrowhead
    const dx=to.center[0]-from.center[0],dy=to.center[1]-from.center[1];
    const a=Math.atan2(dy,dx);
    c.fillStyle='rgba(255,200,50,0.5)';
    c.beginPath();c.moveTo(to.center[0],to.center[1]);
    c.lineTo(to.center[0]-18*Math.cos(a-0.4),to.center[1]-18*Math.sin(a-0.4));
    c.lineTo(to.center[0]-18*Math.cos(a+0.4),to.center[1]-18*Math.sin(a+0.4));
    c.closePath();c.fill();
  }

  // Battle effects
  for(const ef of G.effects){
    if(ef.type==='battle'){
      const p=ef.time/ef.dur;
      const r=12+p*22,a=1-p;
      const grad=c.createRadialGradient(ef.x,ef.y,0,ef.x,ef.y,r);
      grad.addColorStop(0,`rgba(255,200,100,${a*0.8})`);
      grad.addColorStop(0.4,`rgba(255,100,50,${a*0.5})`);
      grad.addColorStop(1,`rgba(255,50,0,0)`);
      c.fillStyle=grad;
      c.beginPath();c.arc(ef.x,ef.y,r,0,Math.PI*2);c.fill();
    }
  }

  c.restore();
}

// ---- MINIMAP ----
function renderMini(){
  const m=mCtx;
  const mw=mCanvas.width,mh=mCanvas.height;
  m.fillStyle='#0a1628';m.fillRect(0,0,mw,mh);
  const sx=mw/VW,sy=mh/VH;
  for(const t of G.terrs){
    if(!t.pts||t.pts.length<2)continue;
    const col=t.owner>=0?COUNTRIES[t.owner].color:'#1a2a4a';
    m.fillStyle=t.isWater?'#0d1f3c':col;
    m.strokeStyle='rgba(255,255,255,0.12)';m.lineWidth=0.5;
    m.beginPath();m.moveTo(t.pts[0][0]*sx,t.pts[0][1]*sy);
    for(let i=1;i<t.pts.length;i++)m.lineTo(t.pts[i][0]*sx,t.pts[i][1]*sy);
    m.closePath();m.fill();m.stroke();
  }
  const cam=G.camera;
  const vw=W/cam.zoom,vh=H/cam.zoom;
  m.strokeStyle='rgba(255,255,255,0.5)';m.lineWidth=1.5;
  m.strokeRect((cam.x-vw/2)*sx,(cam.y-vh/2)*sy,vw*sx,vh*sy);
}

// ---- UI UPDATE ----
function updateUI(){
  if(G.player<0||G.picking){document.getElementById('topBar').style.display='none';return;}
  document.getElementById('topBar').style.display='flex';
  const cc=COUNTRIES[G.player];
  document.getElementById('pFlag').style.background=cc.color;
  document.getElementById('pName').textContent=cc.name;
  const pop=G.terrs.filter(t=>t.owner===G.player&&!t.isWater).reduce((s,t)=>s+t.army*0.5+t.dev*200,0);
  const inc=G.terrs.filter(t=>t.owner===G.player&&!t.isWater).reduce((s,t)=>s+t.dev*(cc.eco*0.3+1),0);
  const totA=G.terrs.filter(t=>t.owner===G.player&&!t.isWater).reduce((s,t)=>s+t.army,0);
  const nT=G.terrs.filter(t=>t.owner===G.player&&!t.isWater).length;
  document.getElementById('statPop').textContent=fmt(pop);
  document.getElementById('statMoney').textContent=fmt(inc);
  document.getElementById('statArmy').textContent=fmt(totA);
  document.getElementById('statTerr').textContent=nT;
}

function fmt(n){
  if(n>=1e6)return (n/1e6).toFixed(1)+'M';
  if(n>=1e3)return (n/1e3).toFixed(1)+'K';
  return Math.floor(n).toString();
}

// ---- HUD (messages, labels, crosshair) ----
function renderHUD(){
  const c=ctx;
  // Messages (on canvas since we don't have a separate hud canvas)
  c.save();
  c.font='12px Arial';c.textAlign='left';c.textBaseline='top';
  for(let i=0;i<Math.min(G.msgs.length,6);i++){
    c.fillStyle=`rgba(255,255,255,${0.6-i*0.08})`;
    c.fillText(G.msgs[i],14,75+i*17);
  }
  c.restore();

  // Attack hint
  if(G.attackFrom>=0&&!G.picking&&!G.paused){
    const t=G.terrs[G.attackFrom];
    if(t){
      const [sx,sy]=worldToScr(t.center[0],t.center[1]);
      c.save();
      c.fillStyle='rgba(255,200,50,0.8)';
      c.font='bold 13px Arial';c.textAlign='center';c.textBaseline='bottom';
      c.shadowColor='rgba(0,0,0,0.8)';c.shadowBlur=4;
      c.fillText('⚔ Click enemy territory to attack',sx,sy-35);
      c.shadowBlur=0;
      c.restore();
    }
  }
}

// ---- GAME LOOP ----
function loop(time){
  updateCam();
  if(!G.picking&&!G.paused&&!G.won&&!G.lost){
    G.time+=16;
    const interval=1000/G.speed;
    G.tickAcc+=16;
    while(G.tickAcc>=interval){G.tickAcc-=interval;tick();}
  }
  render();
  renderMini();
  renderHUD();
  updateUI();
  requestAnimationFrame(loop);
}

// ---- START ----
setup();
</script>
